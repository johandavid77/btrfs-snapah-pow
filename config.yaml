server:
  host: "0.0.0.0"
  port: 8081
  grpc_port: 9090
  tls_enabled: false

database:
  driver: "sqlite"
  database: "/var/lib/snapah-pow/snapah.db"

auth:
  jwt_secret: "cambia-esto-en-produccion"
  token_expiry_hours: 24
