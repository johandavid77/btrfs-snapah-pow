syntax = "proto3";

package snapmanager;
option go_package = "github.com/corp/btrfs-snapah-pow/api/proto";

service SnapManager {
  rpc CreateSnapshot(CreateSnapshotRequest) returns (Snapshot);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
  
  rpc RegisterNode(RegisterNodeRequest) returns (Node);
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  
  rpc StreamEvents(StreamEventsRequest) returns (stream Event);
}

message Snapshot {
  string id = 1;
  string node_id = 2;
  string subvolume_path = 3;
  string snapshot_path = 4;
  string created_at = 5;
  bool is_readonly = 6;
  string parent_snapshot_id = 7;
  string uuid = 8;
  map<string, string> labels = 9;
  string status = 10;
}

message CreateSnapshotRequest {
  string node_id = 1;
  string subvolume_path = 2;
  string snapshot_name = 3;
  bool readonly = 4;
  map<string, string> labels = 5;
}

message DeleteSnapshotRequest {
  string snapshot_id = 1;
  bool force = 2;
}

message DeleteSnapshotResponse {
  bool success = 1;
  string message = 2;
}

message ListSnapshotsRequest {
  string node_id = 1;
  string subvolume_path = 2;
}

message ListSnapshotsResponse {
  repeated Snapshot snapshots = 1;
}

message Node {
  string id = 1;
  string hostname = 2;
  string address = 3;
  string status = 4;
  string last_seen = 5;
}

message RegisterNodeRequest {
  string hostname = 1;
  string address = 2;
  string token = 3;
}

message ListNodesRequest {}

message ListNodesResponse {
  repeated Node nodes = 1;
}

message Event {
  string id = 1;
  string type = 2;
  string node_id = 3;
  string message = 4;
  string timestamp = 5;
  string severity = 6;
}

message StreamEventsRequest {
  string node_id = 1;
}
